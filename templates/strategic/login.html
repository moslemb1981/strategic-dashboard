{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود | پورتال اداره مطالعات و توسعه استراتژیک</title>
<link rel="stylesheet" href="{% static 'css/fontawesome.min.css' %}">
<link rel="stylesheet" href="{% static 'css/solid.min.css' %}">
<link rel="stylesheet" href="{% static 'css/strategic-fonts.css' %}">
<style>
  body{margin:0;font-family:'Vazirmatn','IRANSans',Tahoma,sans-serif;background:#1E3F60;
       min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;}
  .login-card{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:340px;
              box-shadow:0 12px 32px rgba(0,0,0,.25);}
  .login-mark{width:44px;height:44px;margin-bottom:14px;}
  .login-card h1{font-size:16px;margin:0 0 3px;color:#1B2430;}
  .login-card .sub{font-size:11.5px;color:#5B6472;margin-bottom:20px;}
  .login-card label{display:block;font-size:11.5px;color:#5B6472;margin-bottom:5px;}
  .login-card input{width:100%;border:1px solid #E2DED2;border-radius:8px;padding:10px 12px;
                     margin-bottom:14px;font-family:inherit;font-size:13px;color:#1B2430;
                     direction:rtl;text-align:right;box-sizing:border-box;}
  .login-card input[type="text"],.login-card input[type="password"]{direction:ltr;text-align:right;}
  .login-card button{width:100%;border:none;border-radius:9px;padding:11px;background:#2E5C8A;
                      color:#fff;font-weight:600;font-size:13px;cursor:pointer;}
  .login-card button:hover{background:#1E3F60;}
  .login-error{background:#FBEAEA;color:#B0413E;border-radius:8px;padding:9px 12px;font-size:11.5px;margin-bottom:14px;}
</style>
</head>
<body>
  <div class="login-card">
    <img class="login-mark" src="{% static 'images/logo.svg' %}" alt="سایپا یدک">
    <h1>سایپا یدک</h1>
    <div class="sub">اداره مطالعات و توسعه استراتژیک — ورود به پورتال</div>

    {% if form.errors %}
      <div class="login-error"><i class="fa-solid fa-triangle-exclamation"></i> نام کاربری یا رمز عبور اشتباه است</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>نام کاربری</label>
      <input type="text" name="username" autofocus>
      <label>رمز عبور</label>
      <input type="password" name="password">
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">ورود</button>
    </form>
  </div>
</body>
</html>
